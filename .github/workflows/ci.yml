name: CI
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Byte-compile all Python
        run: python -m compileall Home.py shared.py pages
      - name: Import shared module (engine sanity)
        run: python -c "import shared; assert shared.regime_new(1275000, True, 'below60', 0)['total'] == 0; print('engine OK')"
